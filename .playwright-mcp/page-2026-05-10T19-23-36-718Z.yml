      - heading "The honest take" [level=3] [ref=e40]
      - paragraph [ref=e41]: Asphalt shingles last 20–30 years here. Standing-seam metal lasts 50+ but costs roughly double up front. We'll quote both side by side so you can see the math before you decide.
