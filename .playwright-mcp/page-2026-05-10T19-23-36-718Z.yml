      - heading "About this service" [level=2] [ref=e27]
      - paragraph [ref=e28]: Most leaks aren't through the shingles — they're through bad flashings, missed underlayment, or skipped ice-and-water shield. We do the boring stuff first, then the visible part.
      - paragraph [ref=e29]: We work asphalt shingles, standing-seam metal, and panel metal. We size ice-and-water on every eave and valley. We size venting to your soffit and ridge. We tear off, sheath if needed, and re-roof clean.
