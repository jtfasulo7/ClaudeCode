  - generic [ref=e89]:
    - generic [ref=e90]:
      - heading "Roofing in Missoula & Western Montana" [level=3] [ref=e91]
      - paragraph [ref=e92]: A Montana roof has to handle four feet of snow, ice dams in shoulder season, sun and UV at altitude, and serious wind exposure on ridgeline lots. The shingles or panels are the visible part — but the failures we see come from missed ice-and-water shield at the eaves, valleys, and penetrations, or from insufficient soffit-to-ridge ventilation that lets attics roast in summer and trap moisture in winter.
      - paragraph [ref=e93]: We work asphalt shingle, metal panel, and standing-seam roofs across Missoula, the Bitterroot, Seeley Lake, and up to the Flathead. Ice-and-water shield on every eave and valley is standard for us, not an upcharge. Ventilation is sized to your roof's geometry — soffit intake and ridge or off-ridge exhaust balanced properly. Flashing is the part nobody photographs but is the only reason roofs last.
