          - text: — Roofs on custom builds, additions, and outbuildings.
        - listitem [ref=e101]:
          - strong [ref=e102]: Metal roof conversions
          - text: — Standing-seam or panel metal replacing aged asphalt.
        - listitem [ref=e103]:
          - strong [ref=e104]: Storm damage repair
          - text: — Hail and wind damage assessed, documented, and repaired.
        - listitem [ref=e105]:
          - strong [ref=e106]: Ventilation upgrades
          - text: — Soffit, ridge, and gable vents added to existing roofs.
