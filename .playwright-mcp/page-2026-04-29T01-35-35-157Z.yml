    - region "Asked & answered." [ref=e267]:
      - generic [ref=e268]:
        - generic [ref=e269]:
          - paragraph [ref=e270]: FAQ
          - heading "Asked & answered." [level=2] [ref=e271]
        - generic [ref=e272]:
          - generic [ref=e273]:
            - term [ref=e274]: How long does ceramic coating actually last?
            - definition [ref=e275]: The 5-year tier we install is rated for 5 years with proper maintenance washes (every 4–6 weeks). The 9-year flagship has a transferable warranty backed by the manufacturer. We recommend an annual maintenance wash to keep the warranty active — it's included with the package.
          - generic [ref=e276]:
            - term [ref=e277]: Do you come to me, or do I come to you?
            - definition [ref=e278]: Both. Express and Premium packages can be done at your home or office (we bring water and power). Showroom packages with paint correction or ceramic coating are done in our temperature-controlled shop because dust control and curing matter.
          - generic [ref=e279]:
            - term [ref=e280]: What if it rains the day of my appointment?
            - definition [ref=e281]: For mobile jobs we'll reach out the morning of with a recommendation. We never start a paint correction in marginal conditions. Rescheduling is free up to 24 hours before your slot.
          - generic [ref=e282]:
            - term [ref=e283]: Will paint correction damage my clear coat?
            - definition [ref=e284]: No. We measure paint depth before and after every stage and never remove more than necessary. You'll get the readings in your before/after report so you know exactly what was done.
          - generic [ref=e285]:
            - term [ref=e286]: How do I maintain the finish between visits?
            - definition [ref=e287]: Hand wash, never automatic. Two-bucket method with a pH-neutral soap. Avoid touch tunnels and brush washes. We send a maintenance kit + walkthrough video with every Showroom package.
          - generic [ref=e288]:
            - term [ref=e289]: Do you guarantee your work?
            - definition [ref=e290]: Yes. 7-day re-correction window — if anything's not right, we make it right at no charge. Ceramic coatings carry the manufacturer's warranty, registered in your name.
