    - generic [ref=e73]:
      - paragraph [ref=e74]: Anthropic
      - paragraph [ref=e75]: Rough week. On March 26, details of an unreleased model called "Claude Mythos" leaked from an unsecured database — it's a tier above Opus with what insiders call "unprecedented" cybersecurity capabilities. Five days later, Claude Code's entire source code (512k lines of TypeScript) spilled through an npm source map mistake. That leak revealed an unreleased feature called KAIROS — a persistent background agent that runs tasks without human input. Two breaches in five days from the company that brands itself as the safety lab.
      - paragraph [ref=e76]: → The Mythos leak is actually bullish — it confirms something significantly beyond current Opus exists. But the optics are terrible, especially with IPO talks heating up for Q4.
    - generic [ref=e77]:
      - paragraph [ref=e78]: Apple
      - paragraph [ref=e79]: "iOS 27 will let Claude, Gemini, and other AI models plug directly into the iPhone through a new Extensions system. Apple's also building its own chatbot — codenamed \"Campos\" — powered by Google's 1.2 trillion parameter Gemini model running on Apple's Private Cloud Compute. Classic Apple: let everyone else build the hard part, then own the distribution."
      - paragraph [ref=e80]: → When Claude and Gemini are baked into iOS, the "which AI should I use?" question disappears for a billion people. That's not a feature update. That's a market restructuring.
    - generic [ref=e81]:
      - paragraph [ref=e82]: Arm
      - paragraph [ref=e83]: Unveiled what they're calling the "AGI CPU" — a 136-core, 3nm chip built specifically for AI inference. Meta's the launch customer. OpenAI, Cloudflare, and SAP are in. This is a direct shot at Nvidia's stranglehold on AI compute.
      - paragraph [ref=e84]: → If inference costs drop, API prices drop. If API prices drop, the cost of building with AI drops for everyone. Watch this one — it's infrastructure, not hype, and that's where the real shifts happen.
