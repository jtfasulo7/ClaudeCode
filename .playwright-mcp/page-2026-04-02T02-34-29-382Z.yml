      - paragraph [ref=e92]: Claude Code supply chain attack via Axios trojan
      - paragraph [ref=e93]:
        - text: "Claude Code v2.1.88 shipped with source maps that exposed 512k lines of TypeScript. But the bigger issue: a trojanized Axios dependency was injected between 00:21–03:29 UTC on March 31, installing a cross-platform RAT. If you ran"
        - code [ref=e94]: npm install
        - text: or
        - code [ref=e95]: npm update
        - text: in that window, audit immediately. The leaked source also revealed an unreleased feature called KAIROS — a persistent background agent mode.
      - link "Read more →" [ref=e96] [cursor=pointer]:
        - /url: https://thehackernews.com/2026/04/claude-code-tleaked-via-npm-packaging.html
    - generic [ref=e97]:
      - paragraph [ref=e98]: Anthropic ships Compliance API for Claude Platform
      - paragraph [ref=e99]: Dropped March 30 with zero fanfare. Programmatic access to full audit logs across your org — conversation logs, tool use traces, and permission events. If you're building Claude integrations in regulated industries (healthcare, finance), this replaces the manual CSV export workflow and unblocks SOC 2 and HIPAA audit requirements.
      - link "Read more →" [ref=e100] [cursor=pointer]:
        - /url: https://www.labla.org/latest-ai-model-releases-past-24-hours/ai-releases-roundup-what-actually-launched-on-march-29-30-and-31-2026/
    - generic [ref=e101]:
      - paragraph [ref=e102]: "Arm AGI CPU: 136-core, 3nm inference silicon"
      - paragraph [ref=e103]: Arm's first in-house chip uses TSMC N3P, 136 Neoverse V3 cores at 3.5GHz, 2MB L2 per core, 6GB/s memory bandwidth per core at sub-100ns latency, 300W TDP. Chiplet architecture with deterministic per-core threading — no throttling, no idle threads. Co-designed with Meta. Production silicon available now; volume shipments by EOY 2026.
      - link "Read more →" [ref=e104] [cursor=pointer]:
        - /url: https://newsroom.arm.com/news/arm-agi-cpu-launch
    - generic [ref=e105]:
      - paragraph [ref=e106]: "ARC-AGI-3 benchmark: every frontier model under 1%"
      - paragraph [ref=e107]: Launched March 26 with a $2M prize pool. Tests novel reasoning — not pattern recall. GPT-5.4, Claude Opus 4.6, Gemini 3.1 Pro all scored under 1%. The benchmark uses tasks that require genuine abstraction and generalization, explicitly designed to resist memorization and prompt engineering. If you're evaluating model capabilities for production use, this is the sobriety check.
      - link "Read more →" [ref=e108] [cursor=pointer]:
        - /url: https://www.theneuron.ai/ai-news-digests/-around-the-horn-digest-everything-that-happened-in-ai-this-weekend-march-28-29-2026/
