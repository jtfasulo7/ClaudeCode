    - heading "Industry Moves" [level=2] [ref=e113]
    - generic [ref=e114]:
      - paragraph [ref=e115]: Anthropic
      - paragraph [ref=e116]: Rough week. On March 26, details of an unreleased model called "Claude Mythos" leaked from an unsecured database — it's a tier above Opus with what insiders call "unprecedented" cybersecurity capabilities. Five days later, Claude Code's entire source code spilled through an npm source map mistake. Two breaches in five days from the company that brands itself as the safety lab.
      - paragraph [ref=e117]: → The Mythos leak is actually bullish — it confirms something significantly beyond current Opus exists. But the optics are terrible, especially with IPO talks heating up for Q4.
      - link "Full story →" [ref=e118] [cursor=pointer]:
        - /url: https://fortune.com/2026/03/26/anthropic-says-testing-mythos-powerful-new-ai-model-after-data-leak-reveals-its-existence-step-change-in-capabilities/
    - generic [ref=e119]:
      - paragraph [ref=e120]: Apple
      - paragraph [ref=e121]: "iOS 27 will let Claude, Gemini, and other AI models plug directly into the iPhone through a new Extensions system. Apple's also building its own chatbot — codenamed \"Campos\" — powered by Google's 1.2 trillion parameter Gemini model running on Apple's Private Cloud Compute. Classic Apple: let everyone else build the hard part, then own the distribution."
      - paragraph [ref=e122]: → When Claude and Gemini are baked into iOS, the "which AI should I use?" question disappears for a billion people. That's not a feature update. That's a market restructuring.
      - link "Full story →" [ref=e123] [cursor=pointer]:
        - /url: https://winbuzzer.com/2026/03/31/apple-plans-open-siri-rival-ai-chatbots-ios-27-xcxwbn/
    - generic [ref=e124]:
      - paragraph [ref=e125]: Arm
      - paragraph [ref=e126]: Unveiled what they're calling the "AGI CPU" — a 136-core, 3nm chip built specifically for AI inference. Meta's the launch customer. OpenAI, Cloudflare, and SAP are in. This is a direct shot at Nvidia's stranglehold on AI compute.
      - paragraph [ref=e127]: → If inference costs drop, API prices drop. If API prices drop, the cost of building with AI drops for everyone. Watch this one — it's infrastructure, not hype, and that's where the real shifts happen.
