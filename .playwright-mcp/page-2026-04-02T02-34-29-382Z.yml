    - heading "Tool Spotlight" [level=2] [ref=e10]
    - generic [ref=e11]:
      - heading "Qwen3.5-Omni" [level=3] [ref=e12]
      - paragraph [ref=e13]: Alibaba quietly dropped this on March 30 and it's kind of absurd. One model that handles text, images, 10+ hours of audio, and video — natively, in a single pass. It speaks 113 languages. It beat Google's Gemini 3.1 Pro on audio benchmarks. And it's open-source.
      - generic [ref=e14]:
        - paragraph [ref=e15]: How to use it now
        - paragraph [ref=e16]: "The wildest feature nobody's talking about: \"Audio-Visual Vibe Coding.\" Record your screen doing a task, feed the video to Qwen3.5-Omni, and it writes working code based on what it sees and hears. Three sizes available (Plus, Flash, Light) with 256k context."
      - paragraph [ref=e17]: An open-source model outperforming Google's flagship on audio. The moat between closed and open models is basically a puddle now.
      - link "Try Qwen3.5-Omni →" [ref=e18] [cursor=pointer]:
        - /url: https://huggingface.co/collections/Qwen/qwen35
    - generic [ref=e19]:
      - heading "Claude Computer Use + Dispatch" [level=3] [ref=e20]
      - paragraph [ref=e21]: "Anthropic did something genuinely new on March 23. Claude can now take over your Mac — clicking, typing, opening apps, running browser workflows. No setup. No plugins. But the real move is pairing it with Dispatch: you text Claude a task from your iPhone while you're out, and it executes the whole thing on your desktop. You come home to finished work. That's not a gimmick. That's a shift."
      - generic [ref=e22]:
        - paragraph [ref=e23]: How to use it now
        - paragraph [ref=e24]: Claude Pro or Max on macOS. Open Claude Desktop, flip on Computer Use in settings. It tries connectors first (Slack, Gmail, etc.) and falls back to raw screen control when there's no shortcut. Leave your laptop open, assign tasks from your phone. Seriously — try it with something tedious you've been putting off.
      - paragraph [ref=e25]: This is the first "delegate from your phone, pick up finished work at your desk" experience that actually works. Everyone else is still demoing.
      - link "Try Claude Computer Use →" [ref=e26] [cursor=pointer]:
        - /url: https://claude.com/blog/dispatch-and-computer-use
    - generic [ref=e27]:
      - heading "Bluesky Attie" [level=3] [ref=e28]
      - paragraph [ref=e29]: Launched March 30. Every other social platform decides what you see. Bluesky just said "build your own algorithm" — and made it dead simple. Describe your ideal feed in plain English and Attie generates a custom filter. No code. No technical knowledge.
      - generic [ref=e30]:
        - paragraph [ref=e31]: How to use it now
        - paragraph [ref=e32]: Bluesky → Feeds → Attie. Type something like "AI research papers but not product launches" or "indie game devs posting progress updates." It builds the algorithm. You save it, share it, tweak it. The fun part is getting weird with it.
      - paragraph [ref=e33]: User-controlled algorithms are the opposite of what Big Tech wants. Now AI makes them accessible to people who can't write code. That matters.
      - link "Try Bluesky Attie →" [ref=e34] [cursor=pointer]:
        - /url: https://techcrunch.com/2026/03/28/bluesky-leans-into-ai-with-attie-an-app-for-building-custom-feeds/
