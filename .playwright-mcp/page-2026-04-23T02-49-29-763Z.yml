    - region "The recruiting game has changed. The rules families play by haven’t." [ref=e64]:
      - generic [ref=e65]:
        - paragraph [ref=e66]:
          - generic [ref=e67]: № 02
          - text: — The landscape
        - heading "The recruiting game has changed. The rules families play by haven’t." [level=2] [ref=e68]:
          - text: The recruiting game has changed.
          - emphasis [ref=e69]: The rules families play by haven’t.
        - generic [ref=e70]:
          - article [ref=e71]:
            - heading "Showcase inflation." [level=3] [ref=e72]
            - paragraph [ref=e73]: Thousands of athletes now attend the same combines. Being seen is no longer the same as being chosen. Film, context, and an honest evaluation are what move the needle.
          - article [ref=e74]:
            - heading "Highlight-reel fatigue." [level=3] [ref=e75]
            - paragraph [ref=e76]: Coaches watch clips in three-second decisions. A reel without a story, without a target list, without a trusted voice attached — it lives in a thousand unread inboxes.
          - article [ref=e77]:
            - heading "Noise, not signal." [level=3] [ref=e78]
            - paragraph [ref=e79]: AI platforms and mass-email services treat recruiting like a volume game. College coaches treat it like a relationship. The bridge between those two worlds is what we do.
    - region "From Youngstown to the NCAA." [ref=e80]:
      - generic [ref=e81]:
        - generic [ref=e82]:
          - paragraph [ref=e83]:
            - generic [ref=e84]: № 03
            - text: — The founder
          - heading "From Youngstown to the NCAA." [level=2] [ref=e85]
          - paragraph [ref=e86]:
            - generic [ref=e87]: K
            - text: iyoshi “Terrell” Fish was raised in Youngstown, Ohio — one of fourteen siblings in a house built on a nearly fifty-year marriage. That’s not color; that’s the operating system. Big families teach you how to see the whole room. How to advocate for someone quieter than you. How to tell the difference between a real opportunity and a promise that won’t cash.
          - paragraph [ref=e88]: "Fifteen years in sport evaluation followed: NFL scouting that helped surface names like Curtis Marsh and Spencer Paysinger, sideline work as a quarterback and wide-receiver coach, and a state-championship culture he helped build from inside the program. The eye was trained the long way."
          - paragraph [ref=e89]: Then came the part most recruiters don’t have. A Master’s in Psychology from the University of Phoenix. A parallel career as a social worker with the Department of Child Safety — ten years of advocating for young people whose futures depended on somebody in the room paying attention. That is the work. Recruiting is the same work, translated to film rooms and offer letters.
          - figure "— Kiyoshi T. Fish, Highway of Life" [ref=e90]:
            - text: “
            - blockquote [ref=e91]: “As you travel the highway of life, face the future with confidence — and appreciate everyone who comes across your path. Because everybody is somebody.”
            - generic [ref=e92]: — Kiyoshi T. Fish, Highway of Life
          - paragraph [ref=e93]: Today he works independently out of Phoenix, Arizona. No university payroll. No conference allegiances. No quota to hit. His job is the family in front of him, and the college coach he’s about to pick up the phone and call.
