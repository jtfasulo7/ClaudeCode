        - heading "Six stages. No shortcuts." [level=2] [ref=e121]:
          - text: Six stages.
          - emphasis [ref=e122]: No shortcuts.
        - list [ref=e123]:
          - listitem [ref=e124]:
            - generic [ref=e125]: I.
            - generic [ref=e126]:
              - heading "Evaluation" [level=3] [ref=e127]
              - paragraph [ref=e128]: An honest, scout-level assessment of your athlete’s ceiling, fit, and realistic division range. We tell you what we see — not what you want to hear.
          - listitem [ref=e129]:
            - generic [ref=e130]: II.
            - generic [ref=e131]:
              - heading "Positioning" [level=3] [ref=e132]
              - paragraph [ref=e133]: A profile, a film, and a narrative built the way coaches actually consume them. Bio, stats, GPA, test scores, character — every detail in its correct place.
          - listitem [ref=e134]:
            - generic [ref=e135]: III.
            - generic [ref=e136]:
              - heading "Targeting" [level=3] [ref=e137]
              - paragraph [ref=e138]: "A custom list of programs built across three fits: division fit, academic fit, coach fit. From over 52,000 college coaches, we shortlist the ones who’d actually want you."
          - listitem [ref=e139]:
            - generic [ref=e140]: IV.
            - generic [ref=e141]:
              - heading "Outreach" [level=3] [ref=e142]
              - paragraph [ref=e143]: Coach-to-coach conversations, not mass emails. The introduction your athlete can’t make for themselves — made on their behalf by someone coaches already know.
          - listitem [ref=e144]:
            - generic [ref=e145]: V.
            - generic [ref=e146]:
              - heading "Navigation" [level=3] [ref=e147]
              - paragraph [ref=e148]: NCAA and NAIA eligibility. Camp and showcase strategy. Official visits, unofficial visits, and the hundred small decisions that add up to an offer.
          - listitem [ref=e149]:
            - generic [ref=e150]: VI.
            - generic [ref=e151]:
              - heading "Commitment" [level=3] [ref=e152]
              - paragraph [ref=e153]: Scholarship strategy. Financial aid review. Letter-of-intent walkthrough. We stay in the room until the right decision is signed and celebrated.
