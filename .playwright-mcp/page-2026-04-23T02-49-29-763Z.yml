    - region "Answered honestly." [ref=e223]:
      - generic [ref=e224]:
        - paragraph [ref=e225]:
          - generic [ref=e226]: № 07
          - text: — Questions
        - heading "Answered honestly." [level=2] [ref=e227]
        - generic [ref=e228]:
          - generic [ref=e229]:
            - term [ref=e230]: When should we start?
            - definition [ref=e231]: Ideally in the sophomore or early junior year of high school. Earlier is better for national-caliber athletes. Later is still workable — we’ve placed seniors deep into the spring cycle.
          - generic [ref=e232]:
            - term [ref=e233]: Which sports do you actually cover?
            - definition [ref=e234]: Every sport. Football, basketball, baseball, softball, soccer, volleyball, lacrosse, track, swimming, wrestling, tennis, golf — men’s and women’s. If there’s a college coach recruiting it, we can reach them.
          - generic [ref=e235]:
            - term [ref=e236]: Which divisions?
            - definition [ref=e237]: NCAA Division I, II, III, NAIA, and JUCO. The right division is the one where your athlete will actually play, develop, and graduate — not the one with the biggest logo.
          - generic [ref=e238]:
            - term [ref=e239]: How is this different from a recruiting platform?
            - definition [ref=e240]: Platforms hand you a database and a template. We do the phone call. The introductions are made by a human coaches already know — that’s the entire difference.
          - generic [ref=e241]:
            - term [ref=e242]: Do you work with parents, athletes, or both?
            - definition [ref=e243]: Both, as a unit. Parents handle logistics and finances. Athletes handle training and decisions. We translate between the two and keep everyone moving in the same direction.
          - generic [ref=e244]:
            - term [ref=e245]: Is a scholarship guaranteed?
            - definition [ref=e246]: No — and be wary of anyone who tells you otherwise. What’s guaranteed is honest evaluation, direct coach access, and a process built to maximize every real opportunity.
