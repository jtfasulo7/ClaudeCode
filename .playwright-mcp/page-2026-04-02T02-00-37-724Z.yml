        - paragraph [ref=e16]: Available to Perplexity Max subscribers ($200/mo). Join the waitlist at perplexity.ai/personal-computer-waitlist. It runs on Mac Mini hardware with always-on uptime — every action requires your approval and generates a full audit trail.
