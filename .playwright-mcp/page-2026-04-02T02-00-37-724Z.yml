        - paragraph [ref=e30]: Download from OpenAI's developer tools page. It's designed to sit alongside your IDE — think of it as a project manager for AI coding agents that handles context, file access, and multi-step task orchestration in one interface.
      - paragraph [ref=e31]: OpenAI is betting that AI coding needs its own app, not just a chat window — a direct response to Anthropic's Claude Code CLI.
