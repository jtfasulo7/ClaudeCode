        - paragraph [ref=e23]: "GPT-5.4 Thinking is available now on Plus, Team, and Pro plans. The \"upfront plan\" feature lets you see the model's reasoning before it executes — adjust course mid-response by interrupting and redirecting. For developers: the Tool Search API cuts token costs significantly when passing many tool definitions."
