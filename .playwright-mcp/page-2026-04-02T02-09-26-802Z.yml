      - heading "Qwen3.5-Omni" [level=3] [ref=e12]
      - paragraph [ref=e13]: Alibaba's new omnimodal model, released March 30. Processes text, images, audio (10+ hours), and video natively in a single pass. Supports speech recognition in 113 languages and hit 215 SOTA benchmark results — outperforming Gemini 3.1 Pro on audio understanding.
      - generic [ref=e14]:
        - paragraph [ref=e15]: How to use it now
        - paragraph [ref=e16]: "Available in three sizes (Plus, Flash, Light) with 256k context. Try the \"Audio-Visual Vibe Coding\" feature: record your screen doing a task, feed the recording to Qwen3.5-Omni, and it writes functional code based on what it sees and hears. Access via Hugging Face or the Qwen API."
      - paragraph [ref=e17]: An open-source model beating Google's flagship on audio tasks — the gap between open and closed models is shrinking fast.
    - generic [ref=e18]:
      - heading "Claude Computer Use (March 23)" [level=3] [ref=e19]
      - paragraph [ref=e20]: Anthropic shipped native computer control in Claude Code and Cowork. Claude can now click, type, open apps, navigate browsers, and complete full workflows on your Mac — no setup required. When paired with Dispatch, you assign tasks from your iPhone and Claude executes them on your desktop while you're away.
      - generic [ref=e21]:
        - paragraph [ref=e22]: How to use it now
        - paragraph [ref=e23]: Available to Claude Pro and Max subscribers on macOS. Open Claude Desktop, enable Computer Use in settings, then ask Claude to do anything on your machine — file management, browser tasks, app workflows. It uses connectors first (Slack, Gmail) and falls back to direct screen control when needed.
      - paragraph [ref=e24]: The Dispatch + Computer Use combo is the first real "delegate from your phone, pick up the finished work at your desk" experience.
    - generic [ref=e25]:
      - heading "Bluesky Attie (March 30)" [level=3] [ref=e26]
      - paragraph [ref=e27]: Bluesky launched Attie, an AI tool that lets any user build custom feed algorithms without writing code. Instead of being force-fed a black-box algorithm, you describe what you want to see and Attie generates a personal feed filter.
      - generic [ref=e28]:
        - paragraph [ref=e29]: How to use it now
        - paragraph [ref=e30]: Open Bluesky, go to Feeds, and look for Attie. Describe your ideal feed in plain English (e.g. "AI research papers but not product launches" or "indie game devs posting progress updates"). It generates a custom algorithm you can save, share, and iterate on.
      - paragraph [ref=e31]: User-controlled algorithms are the opposite of what every other social platform does — and now AI makes them accessible to non-developers.
