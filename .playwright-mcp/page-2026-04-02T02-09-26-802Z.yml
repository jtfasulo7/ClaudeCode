    - paragraph [ref=e71]: Section III
    - heading "Industry Moves" [level=2] [ref=e72]
    - generic [ref=e73]:
      - paragraph [ref=e74]: Anthropic
      - paragraph [ref=e75]: Two security breaches in 5 days. First, details of unreleased "Claude Mythos" (codename Capybara) leaked from an unsecured database on March 26 — a model class above Opus with "unprecedented cybersecurity capabilities." Then on March 31, Claude Code's entire source code (512k+ lines of TypeScript) leaked via an npm source map in version 2.1.88. The leak revealed an unreleased feature called KAIROS — a persistent background agent mode.
      - paragraph [ref=e76]: → The Mythos leak confirms a model significantly beyond current Opus is coming. But two security lapses in one week — right as Anthropic pursues an IPO — is a rough look for a company that positions itself as the "safety" lab.
    - generic [ref=e77]:
      - paragraph [ref=e78]: Apple
      - paragraph [ref=e79]: iOS 27 will let third-party AI models (Gemini, Claude, and others) compete inside the iPhone via a new Extensions system. Apple is also building its own chatbot codenamed "Campos" powered by Google's 1.2 trillion parameter Gemini model, running on Apple's Private Cloud Compute infrastructure.
      - paragraph [ref=e80]: → Apple is doing what it does best — letting others build the AI, then controlling the distribution. If Claude and Gemini are baked into iOS, the "which AI should I use?" question disappears for a billion users.
    - generic [ref=e81]:
      - paragraph [ref=e82]: Arm
      - paragraph [ref=e83]: Unveiled the AGI CPU — a 136-core, 3nm data center processor purpose-built for AI inference. Meta is the launch customer, with OpenAI, Cloudflare, and SAP among committed buyers. This is Arm's direct challenge to Nvidia's dominance in AI compute hardware.
      - paragraph [ref=e84]: → If Arm's inference chips perform as claimed, the cost of running AI models in production drops significantly — which means cheaper API pricing across the board.
