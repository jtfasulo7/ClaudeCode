          - text: The Inspiration
        - heading "A fragrance for the seventeen minutes the world catches fire." [level=2] [ref=e55]:
          - text: A fragrance for the
          - emphasis [ref=e56]: seventeen minutes
          - text: the world catches fire.
        - generic [ref=e57]: "\"Most cologne is composed for the room. MERIDIAN is composed for the air outside it — thinner, colder, holding the day's last colour.\""
      - generic [ref=e58]:
        - paragraph [ref=e59]: In 2024, Élise Marchand spent four nights at 3,200 metres in the Bernese Alps with a notebook, a clean rebreather, and twenty-two raw materials. She was looking for the smell of the moment the sun turns the snow the colour of a struck match — neither morning nor night, neither hot nor cold.
        - paragraph [ref=e60]: "The result is MERIDIAN: a structured Eau de Parfum at 22% concentration, cold-distilled over six weeks, rested in oak for three. The composition is unusually mineral. There is bergamot, yes, and an amber base you would expect from any serious house — but threaded between them is a note we call iron oxide: the smell of stone that has held the sun all day and is just beginning to release it."
        - paragraph [ref=e61]: The bottle was cut to match. Fifteen facets, each angled to refract a different fraction of the spectrum. Held to a window at the right hour, it throws the same colours the perfume describes.
        - paragraph [ref=e62]: It is, by design, a fragrance you wear once a day at most. Twice if the day is long enough.
