  - main [ref=e25]:
    - generic [ref=e26]:
      - heading "About this service" [level=2] [ref=e27]
      - paragraph [ref=e28]: Framing is the part of the project that determines how every later trade goes — drywall, trim, cabinets, roofing all assume the bones are right. We measure twice, lay out once, and build to the engineer's spec.
      - paragraph [ref=e29]: We frame walls, floors, roofs, and stairs. Conventional or post-and-beam. Our crews care about the unseen — exact stud spacing, blocking for cabinets and grab bars, hangers on every joist. The job goes faster downstream when it's done right the first time.
      - heading "What's included" [level=3] [ref=e30]
      - list [ref=e31]:
        - listitem [ref=e32]: Wall framing (interior and exterior)
        - listitem [ref=e33]: Floor systems and rim joists
        - listitem [ref=e34]: Roof framing — rafters or trusses
        - listitem [ref=e35]: Stairs and landings
        - listitem [ref=e36]: Sheathing (walls and roof)
        - listitem [ref=e37]: Engineered beams and posts
        - listitem [ref=e38]: Hangers, ties, and connectors
        - listitem [ref=e39]: House wrap
      - heading "The honest take" [level=3] [ref=e40]
      - paragraph [ref=e41]: Framing is messy and loud. We protect what's already there with floor mats and dust walls, and we pick up at the end of every day. If you want fast, post-and-beam goes up in days; conventional is slower but more flexible.
