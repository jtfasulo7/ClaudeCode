  - generic [ref=e84]:
    - generic [ref=e85]:
      - heading "Framing in Missoula & Western Montana" [level=3] [ref=e86]
      - paragraph [ref=e87]: Framing in Western Montana means accounting for snow load, seismic code, and the temperature swings that turn green lumber into split lumber if you're not careful. Most homes in the Missoula and Bitterroot Valley markets are stick-built on conventional foundations, but post-and-beam is increasingly common in custom builds for the great-room aesthetic that makes mountain views the centerpiece. We frame to current Montana code — heavier snow load specs than national averages, with proper bracing for the wind exposure on ridgeline lots and properly stored, dried lumber so hard freezes don't catch us with green wood.
      - paragraph [ref=e88]: From the Bitterroot south of Missoula to Seeley Lake, Polson, and Kalispell up north, conditions and code expectations vary slightly by jurisdiction. We handle the local nuance so you don't have to.
