        - text: "Two obsessions, basically my whole life:"
        - strong [ref=e19]: software
        - text: and
        - strong [ref=e20]: running my own business
        - text: . I graduated with a mechanical engineering degree, but I knew the day I picked up my diploma I was going to work for myself.
      - paragraph [ref=e21]:
        - text: When AI started to get
        - emphasis [ref=e22]: actually
        - text: good, I saw the opportunity I'd been waiting for. Not "AI for AI's sake." AI for the boring, dreaded, no-thinking-required tasks every business has to do every day. Texting back missed calls. Asking customers for reviews. Following up with old leads.
      - paragraph [ref=e23]:
        - text: I named the company
        - strong [ref=e24]: Sybago
        - text: — a play on Sebago Lake in Maine, where I was born. I figured I'd build a quiet, useful little software business that helped people get their time back.
      - heading "Then the Facebook ads started." [level=2] [ref=e25]:
        - text: Then the Facebook ads
        - emphasis [ref=e26]: started.
      - paragraph [ref=e27]:
        - text: The week I incorporated Sybago, my feed turned into a marketing-agency knife fight.
        - emphasis [ref=e28]: "\"We'll scale your agency with our proven lead gen system.\" \"We'll automate your pipeline.\" \"We'll optimize your funnel.\""
        - text: Nothing but jargon. I still get dozens of these every day. I've never clicked one.
      - paragraph [ref=e29]:
        - text: "Then it hit me:"
        - emphasis [ref=e30]: if I feel this way about these agencies, the service-business owners they're targeting must hate them twice as much.
      - paragraph [ref=e31]: I dug into it and found something interesting. Service-business owners — roofers, HVAC techs, plumbers, electricians, landscapers — are some of the most-marketed-to people in the entire United States. Look it up. Their inboxes, their DMs, their voicemails — under siege.
      - paragraph [ref=e32]: So I decided to do something most agencies would call stupid.
      - generic [ref=e33]:
        - text: "\"I'll build you a functional website. I'll put AI into your business that"
        - strong [ref=e34]: texts back every missed call within 30 seconds
        - text: ","
        - strong [ref=e35]: automatically asks your customers for Google reviews
        - text: so you get found more easily, and
        - strong [ref=e36]: texts your old leads
        - text: with a special offer to bring them back. $297 a month. If you see no change in your business after 30 days, I'll give you every cent back and you keep the website."
        - generic [ref=e37]: — JT, on the offer
      - paragraph [ref=e38]: That's it. No upfront fees. No hidden fluff. No bullsh*t.
