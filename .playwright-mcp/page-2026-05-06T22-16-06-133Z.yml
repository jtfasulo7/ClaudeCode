      - paragraph [ref=e43]: I want to keep you for five years. Not four months.
      - paragraph [ref=e44]: $297 is the price where the math works for both of us at scale — I can run a sustainable small operation if a couple hundred contractors stick with me long-term, and you can afford to actually try it without a $24,000 annual commitment.
      - paragraph [ref=e45]: If anyone tells you it's "too cheap to be real" — fine. Skip the demo. We'll be here.
