<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Search · Google</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28' font-family='Arial'%3EG%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo-small" aria-label="Google home">
      <span class="c-blue">G</span><span class="c-red">o</span><span class="c-yellow">o</span><span class="c-blue">g</span><span class="c-green">l</span><span class="c-red">e</span>
    </a>

    <form action="/search" method="get" role="search" style="flex:1; max-width:600px;">
      <label class="search-box" for="q">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="q" name="q" type="search" autocomplete="off" aria-label="Search" />
      </label>
    </form>
  </header>

  <section class="results-wrap" id="results">
    <p class="empty">Loading…</p>
  </section>

  <footer class="site-footer">
    Google clone · powered by Google Custom Search JSON API
  </footer>

  <script src="/app.js"></script>
</body>
</html>
