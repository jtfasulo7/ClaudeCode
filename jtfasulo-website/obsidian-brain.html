<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Brain — Fasulo Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:wght@400;700&display=swap');

  :root {
    --bg: #060608;
    --bg-card: #0c0c10;
    --bg-hover: #121218;
    --cyan: #06b6d4;
    --cyan-dim: rgba(6, 182, 212, 0.15);
    --cyan-glow: rgba(6, 182, 212, 0.4);
    --magenta: #d946ef;
    --amber: #f59e0b;
    --emerald: #10b981;
    --rose: #f43f5e;
    --slate: #64748b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --border: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('data:image/svg+xml,<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.03"/></svg>');
    pointer-events: none;
    z-index: 9999;
  }

  #canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    pointer-events: none;
  }

  .header > * { pointer-events: auto; }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  .header h1 span { color: var(--cyan); }

  .header-controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .header-controls button {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .header-controls button:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
  }

  .header-controls button.active {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
  }

  /* Legend */
  .legend {
    position: fixed;
    bottom: 24px;
    left: 32px;
    z-index: 100;
    display: flex;
    gap: 20px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .legend-item:hover { color: var(--text); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Stats */
  .stats {
    position: fixed;
    bottom: 24px;
    right: 32px;
    z-index: 100;
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .stats span { color: var(--cyan); }

  /* Energy panel */
  .energy-panel {
    position: fixed;
    top: 80px;
    left: 32px;
    z-index: 100;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 220px;
  }

  .energy-panel-title {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 24px;
  }

  .energy-hero {
    text-align: center;
    padding-bottom: 24px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .energy-hero .energy-value {
    font-size: 48px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #ffffff;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .energy-hero .energy-unit {
    font-size: 16px;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    color: var(--cyan);
  }

  .energy-hero .energy-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
    display: block;
  }

  .energy-rows {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .energy-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .energy-row .energy-row-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  .energy-row .energy-row-value {
    font-size: 14px;
    font-family: 'Playfair Display', serif;
    color: var(--text);
  }

  .energy-row .energy-row-value span {
    color: var(--cyan);
  }

  .energy-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    margin-top: 20px;
    margin-bottom: 6px;
    position: relative;
    overflow: hidden;
  }

  .energy-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--cyan), var(--magenta));
    animation: pulse-bar 3s ease-in-out infinite;
  }

  @keyframes pulse-bar {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .energy-bar-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: right;
  }

  /* Info panel */
  .info-panel {
    position: fixed;
    top: 80px;
    right: 32px;
    width: 340px;
    max-height: calc(100vh - 120px);
    z-index: 100;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 0;
    display: none;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .info-panel.visible { display: block; animation: slideIn 0.25s ease-out; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .info-panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .info-panel-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
  }

  .info-panel-header .close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  .info-panel-header .close:hover { color: var(--text); }

  .info-panel-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    margin-top: 8px;
    border: 1px solid;
  }

  .info-panel-body {
    padding: 20px 24px;
  }

  .info-panel-body p {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .info-panel-body .connections {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 8px;
  }

  .info-panel-body .connections h3 {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .info-panel-body .conn-item {
    font-size: 11px;
    color: var(--cyan);
    padding: 6px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: color 0.15s;
  }

  .info-panel-body .conn-item:last-child { border-bottom: none; }
  .info-panel-body .conn-item:hover { color: var(--text); }

  /* Search */
  .search-box {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: none;
  }

  .search-box.visible { display: block; animation: fadeDown 0.2s ease-out; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .search-box input {
    width: 400px;
    padding: 14px 20px;
    background: var(--bg-card);
    border: 1px solid var(--cyan);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    box-shadow: 0 0 40px rgba(6, 182, 212, 0.15);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  /* Tooltip */
  .tooltip {
    position: fixed;
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text);
    pointer-events: none;
    z-index: 300;
    display: none;
    white-space: nowrap;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="header">
  <h1>Fasulo Studio <span>·</span> Knowledge Graph</h1>
  <div class="header-controls">

  <div class="energy-bar">

  </div>
  <div class="energy-bar-label">34% local · 66% cloud</div>
</div>

<div class="energy-panel" style="top: 80px; left: 264px;">

  <div class="energy-hero">
    <span class="energy-value" id="nodeCount"></span>

    </div>
    <div class="energy-row">
      <span class="energy-row-label">Services</span>
      <span class="energy-row-value"><span id="serviceCount"></span></span>
    </div>
    <div class="energy-row">
      <span class="energy-row-label">Agents</span>
      <span class="energy-row-value"><span id="agentCount"></span></span>
    </div>
  </div>

  <div class="energy-bar">
    <div class="energy-bar-fill" style="width: 100%; background: linear-gradient(to right, var(--emerald), var(--cyan));"></div>
  </div>
  <div class="energy-bar-label">Physics: <span id="physicsLabel">active</span></div>
</div>

<div class="info-panel" id="infoPanel">
  <div class="info-panel-header">
    <div>
      <h2 id="infoPanelTitle"></h2>
      <div id="infoPanelTag" class="info-panel-tag"></div>
    </div>
    <button class="close" onclick="closePanel()">×</button>
  </div>
  <div class="info-panel-body" id="infoPanelBody"></div>
</div>

<div class="search-box" id="searchBox">
  <input type="text" placeholder="Search nodes..." id="searchInput" oninput="filterNodes(this.value)">
</div>

<div class="tooltip" id="tooltip"></div>

<canvas id="canvas"></canvas>

  { source: 'vercel', target: 'github' },

  // Instagram
  { source: 'fasulo-studio', target: 'instagram', strength: 0.6 },
  { source: 'instagram', target: 'ig-server' },
  { source: 'instagram', target: 'ig-knowledge' },
  { source: 'instagram', target: 'ig-research' },

  // Shopify
  { source: 'fasulo-studio', target: 'shopify', strength: 0.6 },
  { source: 'shopify', target: 'ledmask' },
  { source: 'shopify', target: 'supplier' },
  { source: 'shopify', target: 'shopify-agents' },

  // Lead Gen
  { source: 'fasulo-studio', target: 'lead-gen', strength: 0.6 },
  { source: 'lead-gen', target: 'lead-scraper' },
  { source: 'lead-gen', target: 'lead-enricher' },
  { source: 'lead-gen', target: 'lead-qualifier' },
  { source: 'lead-scraper', target: 'lead-enricher' },
  { source: 'lead-enricher', target: 'lead-qualifier' },

  // Config
  { source: 'fasulo-studio', target: 'claude-md' },
  { source: 'fasulo-studio', target: 'vercel-json' },
  { source: 'vercel-json', target: 'cron' },
];

// Validate links — remove any that reference non-existent nodes
const nodeIds = new Set(nodes.map(n => n.id));
const validLinks = links.filter(l => {
  const valid = nodeIds.has(l.source) && nodeIds.has(l.target);
  if (!valid) console.warn('Invalid link:', l.source, '→', l.target);
  return valid;
});
// Replace links array with validated version
links.length = 0;
validLinks.forEach(l => links.push(l));

// ─── PHYSICS ENGINE ─────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let physicsEnabled = true;
let dragging = null;
let hovering = null;
let selectedNode = null;
let panX = 0, panY = 0, zoom = 1;
let lastMouse = { x: 0, y: 0 };
let isPanning = false;
let searchVisible = false;
let searchFilter = '';

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Initialize positions
nodes.forEach(n => {
  if (!n.fx) {
    n.x = (Math.random() - 0.5) * 600;
    n.y = (Math.random() - 0.5) * 400;
  } else {
    n.x = n.fx;
    n.y = n.fy;
  }
  n.vx = 0;
  n.vy = 0;
});

function simulate() {
  if (!physicsEnabled) return;
  const alpha = 0.3;

  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = -800 / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      if (!a.fixed) { a.vx += fx * alpha; a.vy += fy * alpha; }
      if (!b.fixed) { b.vx -= fx * alpha; b.vy -= fy * alpha; }
    }
  }

  // Attraction (links)
  links.forEach(l => {
    const s = nodes.find(n => n.id === l.source);
    const t = nodes.find(n => n.id === l.target);
    if (!s || !t) return;
    let dx = t.x - s.x, dy = t.y - s.y;
    let dist = Math.sqrt(dx * dx + dy * dy) || 1;
    let targetDist = 120 + (s.size + t.size);
    let force = (dist - targetDist) * 0.004 * (l.strength || 0.3);
    let fx = (dx / dist) * force;
    let fy = (dy / dist) * force;
    if (!s.fixed) { s.vx += fx; s.vy += fy; }
    if (!t.fixed) { t.vx -= fx; t.vy -= fy; }
  });

  // Center gravity
  nodes.forEach(n => {
    if (n.fixed) return;
    n.vx -= n.x * 0.001;
    n.vy -= n.y * 0.001;
  });

  // Apply velocity
  nodes.forEach(n => {
    if (n.fixed || n === dragging) return;
    n.vx *= 0.85;
    n.vy *= 0.85;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// ─── RENDERING ──────────────────────────────────────────────────────────
let time = 0;

function draw() {
  time += 0.01;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W / 2 + panX, H / 2 + panY);
  ctx.scale(zoom, zoom);

  // Draw links
  links.forEach(l => {
    const s = nodes.find(n => n.id === l.source);
    const t = nodes.find(n => n.id === l.target);
    if (!s || !t) return;

    const isHighlighted = hovering && (hovering.id === s.id || hovering.id === t.id);
    const isSelected = selectedNode && (selectedNode.id === s.id || selectedNode.id === t.id);
    const dimmed = (hovering || selectedNode) && !isHighlighted && !isSelected;

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = isHighlighted || isSelected
      ? `rgba(6, 182, 212, 0.5)`
      : dimmed
        ? `rgba(30, 41, 59, 0.15)`
        : `rgba(30, 41, 59, 0.4)`;
    ctx.lineWidth = isHighlighted || isSelected ? 1.5 : 0.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const cat = CATEGORIES[n.cat];
    const isHover = hovering === n;
    const isSelected = selectedNode === n;
    const isConnected = hovering && getConnections(hovering.id).includes(n.id);
    const isSelectedConn = selectedNode && getConnections(selectedNode.id).includes(n.id);
    const dimmed = (hovering || selectedNode) && !isHover && !isSelected && !isConnected && !isSelectedConn;
    const isFiltered = searchFilter && !n.label.toLowerCase().includes(searchFilter.toLowerCase());

    const r = n.size / 2;
    const alpha = dimmed ? 0.12 : isFiltered ? 0.08 : 1;

    // Glow
    if ((isHover || isSelected) && !isFiltered) {
      const glow = ctx.createRadialGradient(n.x, n.y, r, n.x, n.y, r * 4);
      glow.addColorStop(0, cat.color + '30');
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 4, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Pulse ring for project nodes
    if (n.cat === 'project' && !dimmed && !isFiltered) {
      const pulse = Math.sin(time * 2 + nodes.indexOf(n)) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 4 + pulse * 3, 0, Math.PI * 2);
      ctx.strokeStyle = cat.color + '20';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(cat.color, 0.15 * (dimmed ? 0.3 : 1));
    ctx.fill();
    ctx.strokeStyle = hexToRgba(cat.color, alpha * 0.8);
    ctx.lineWidth = isHover || isSelected ? 2 : 1;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(n.x, n.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(cat.color, alpha);
    ctx.fill();

    // Label
    if (!dimmed && !isFiltered) {
      ctx.font = `${n.size > 20 ? '500' : '300'} ${n.size > 24 ? 11 : 10}px 'JetBrains Mono', monospace`;
      ctx.fillStyle = hexToRgba(isHover || isSelected ? '#ffffff' : '#94a3b8', alpha);
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + r + 14);
    }
  });

  ctx.restore();

  simulate();
  requestAnimationFrame(draw);
}

// ─── INTERACTION ────────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2 - panX) / zoom,
    y: (sy - H / 2 - panY) / zoom,
  };
}

function getNodeAt(sx, sy) {
  const { x, y } = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = n.x - x, dy = n.y - y;
    if (dx * dx + dy * dy < (n.size / 2 + 5) * (n.size / 2 + 5)) return n;
  }
  return null;
}

function getConnections(id) {
  const connected = [];
  links.forEach(l => {
    if (l.source === id) connected.push(l.target);
    if (l.target === id) connected.push(l.source);
  });
  return connected;
}

canvas.addEventListener('mousedown', e => {
  const node = getNodeAt(e.clientX, e.clientY);
  if (node) {
    dragging = node;
    dragging._origFixed = dragging.fixed;
    dragging.fixed = true;
  } else {
    isPanning = true;
  }
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;

  if (dragging) {
    const { x, y } = screenToWorld(e.clientX, e.clientY);
    dragging.x = x;
    dragging.y = y;
    dragging.vx = 0;
    dragging.vy = 0;
  } else if (isPanning) {
    panX += dx;
    panY += dy;
  } else {
    const node = getNodeAt(e.clientX, e.clientY);
    hovering = node;
    canvas.style.cursor = node ? 'pointer' : 'crosshair';

    const tooltip = document.getElementById('tooltip');
    if (node) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.textContent = node.label;
    } else {
      tooltip.style.display = 'none';
    }
  }

  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', e => {
  if (dragging && !isPanning) {
    const movedDist = Math.abs(e.clientX - lastMouse.x) + Math.abs(e.clientY - lastMouse.y);
    if (movedDist < 3) {
      showPanel(dragging);
    }
    dragging.fixed = dragging._origFixed || false;
    dragging = null;
  }
  if (isPanning) isPanning = false;
  dragging = null;
});

canvas.addEventListener('dblclick', e => {
  const node = getNodeAt(e.clientX, e.clientY);
  if (node) showPanel(node);
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.2, Math.min(4, zoom * factor));
}, { passive: false });

// ─── PANEL ──────────────────────────────────────────────────────────────
function showPanel(node) {
  selectedNode = node;
  const panel = document.getElementById('infoPanel');
  const cat = CATEGORIES[node.cat];
  document.getElementById('infoPanelTitle').textContent = node.label;
  const tag = document.getElementById('infoPanelTag');
  tag.textContent = cat.label;
  tag.style.color = cat.color;
  tag.style.borderColor = cat.color;

  const conns = getConnections(node.id);
  const connNodes = conns.map(id => nodes.find(n => n.id === id)).filter(Boolean);

  let html = `<p>${node.desc}</p>`;
  if (connNodes.length) {
    html += `<div class="connections"><h3>Connected to (${connNodes.length})</h3>`;
    connNodes.forEach(cn => {
      html += `<div class="conn-item" onclick="navigateTo('${cn.id}')">${cn.label}</div>`;
    });
    html += `</div>`;
  }
  document.getElementById('infoPanelBody').innerHTML = html;

  panel.classList.add('visible');
}

function closePanel() {
  document.getElementById('infoPanel').classList.remove('visible');
  selectedNode = null;
}

function navigateTo(id) {
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  panX = -node.x * zoom;
  panY = -node.y * zoom;
  showPanel(node);
}

// ─── CONTROLS ───────────────────────────────────────────────────────────
function resetView() {
  panX = 0; panY = 0; zoom = 1;
  closePanel();
  hovering = null;
  searchFilter = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchBox').classList.remove('visible');
  searchVisible = false;
}

function togglePhysics() {
  physicsEnabled = !physicsEnabled;
  document.getElementById('physicsBtn').classList.toggle('active');
}

function toggleSearch() {
  searchVisible = !searchVisible;
  const box = document.getElementById('searchBox');
  box.classList.toggle('visible');
  if (searchVisible) document.getElementById('searchInput').focus();
  else { searchFilter = ''; document.getElementById('searchInput').value = ''; }
}

function filterNodes(val) { searchFilter = val; }

document.addEventListener('keydown', e => {
  if (e.key === 'k' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); toggleSearch(); }
  if (e.key === 'Escape') { closePanel(); resetView(); }
});

// ─── LEGEND & STATS ─────────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  Object.entries(CATEGORIES).forEach(([key, val]) => {
    const count = nodes.filter(n => n.cat === key).length;
    if (count === 0) return;
    el.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${val.color}"></div>${val.label} (${count})</div>`;
  });
}

function updateStats() {
  document.getElementById('stats').innerHTML = `
    zoom: <span>${zoom.toFixed(1)}x</span>
  `;
  document.getElementById('physicsLabel').textContent = physicsEnabled ? 'active' : 'paused';
  requestAnimationFrame(updateStats);
}

function populateCounts() {
  document.getElementById('nodeCount').textContent = nodes.length;
  document.getElementById('linkCount').textContent = links.length;
  document.getElementById('projectCount').textContent = nodes.filter(n => n.cat === 'project').length;
  document.getElementById('apiCount').textContent = nodes.filter(n => n.cat === 'api').length;
  document.getElementById('serviceCount').textContent = nodes.filter(n => n.cat === 'service').length;
  document.getElementById('agentCount').textContent = nodes.filter(n => n.cat === 'agent').length;
}

// ─── UTILS ──────────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── INIT ───────────────────────────────────────────────────────────────
buildLegend();
populateCounts();
updateStats();
draw();
</script>

</body>
